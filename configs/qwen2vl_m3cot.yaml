model:
  model_id: Qwen/Qwen2-VL-2B-Instruct
  device: auto
  dtype: auto
  max_steps: 8
  region_window: 2
  max_answer_tokens: 32
  action_selection: sample
  controller_temperature: 1.0
  controller_index_temperature: 0.07
  pooling: mean
  use_control_tokens: false
  think_append_hidden: true
  controller_context_window: 3
  use_checkpoint: true
  checkpoint_path: "/home/csalt/Haider/DVLM/IVT-LR/qwen_vl/outputs_dynamic_ivtlr/qwen_IVTLR_m3cot_no_hidden_distill_8_steps_prefix_span/epoch_20_full_model_fp32.pth"

dataset:
  type: m3cot
  name: LightChen2333/M3CoT
  split: train
  limit:
  require_image: true
  max_latent_stage: 20

phase2:
  seed: 42
  selection_delta: 0.03
  patch_k_choices: [1, 2, 3, 4]
  max_steps: 8
  image_size: 280
  resume: true
  start_from_end: false
  output_path: outputs/phase2_m3cot_traces.jsonl
  initial_visual_mode: global_mean

phase3:
  seed: 42
  trace_path: outputs/phase2_m3cot_traces.jsonl
  output_dir: outputs/controller_sft_m3cot
  learning_rate: 0.00005
  weight_decay: 0.0
  num_epochs: 3
  max_examples:
  grad_clip_norm: 1.0
  log_every: 10
  image_size: 280
  controller_max_steps: 32
  full_context_probability: 0.1

phase4:
  seed: 42
  trace_path: outputs/phase2_m3cot_traces.jsonl
  controller_checkpoint_path: outputs/controller_sft_m3cot/controller_sft.pt
  output_dir: outputs/counterfactual_m3cot
  controller_lr: 0.0001
  lora_lr: 0.00002
  train_controller: false
  controller_loss_weight: 0.0
  weight_decay: 0.0
  num_epochs: 3
  max_pairs:
  grad_clip_norm: 1.0
  log_every: 100
  image_size: 280
  controller_max_steps: 32
  context_full_probability: 0.2
  negative_type_probs:
    same_image_wrong: 0.7
    different_image_random: 0.3
    same_image_noisy: 0.0
  rank_margin: 0.1
  positive_ce_weight: 0.5
  rank_weight: 0.35
  noise_scale: 0.5

phase5:
  seed: 42
  dataset_partition: validation
  phase4_checkpoint_path: outputs/counterfactual_m3cot/counterfactual.pt
  output_dir: outputs/grpo_phase5_m3cot
  controller_lr: 0.00005
  weight_decay: 0.0
  num_epochs: 1
  max_examples:
  group_size: 6
  update_epochs: 1
  grad_clip_norm: 1.0
  log_every: 10
  image_size: 280
  controller_max_steps: 32
  max_controller_steps: 32
  rollout_temperature: 1.5
  clip_epsilon: 0.2
  logp_weight: 0.2
  counterfactual_weight: 0.3
  use_counterfactual_reward: true
  cf_random_image_probability: 0.35
  no_stop_penalty: 0.2
  advantage_epsilon: 0.000001
  improve_weight: 1.5
  miss_weight: 1.0
  already_correct_weight: 0.5
  regression_weight: 1.5

train:
  seed: 42
  learning_rate: 0.0001
  weight_decay: 0.0
  num_epochs: 1
  group_size: 4
  max_examples:
  grad_clip_norm: 1.0
  log_every: 10
  output_dir: outputs/train_m3cot

inference:
  limit:
  output_path: outputs/m3cot_lvar_predictions.jsonl
  dataset_partition: test
  controller_checkpoint_path: ""
  action_selection: argmax

debug:
  index: 0
